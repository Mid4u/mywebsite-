<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System</title>
    <style>
        /* CSS: Styling for the page */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 400px;
            max-width: 90%;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }

        input[type="text"], 
        input[type="password"], 
        input[type="email"], 
        input[type="number"], 
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* Ensures padding doesn't widen element */
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #218838;
        }

        .switch-link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9em;
        }

        .switch-link a {
            color: #007bff;
            text-decoration: none;
            cursor: pointer;
        }

        /* Utility classes to hide/show screens */
        .hidden {
            display: none;
        }

        /* Profile Picture styling */
        #preview-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 10px auto;
            border: 2px solid #ddd;
        }
        
        /* Error Message */
        .error-msg {
            color: red;
            font-size: 0.85em;
            text-align: center;
            display: none;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- CONTAINER -->
    <div class="container">

        <!-- === LOGIN PAGE === -->
        <div id="login-page">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email / Username</label>
                    <input type="email" id="login-email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="Enter your password">
                    <div class="error-msg" id="login-error">Invalid Email or Password</div>
                </div>
                
                <button type="submit">Login</button>

                <div class="switch-link">
                    Don't have an account? <a onclick="showPage('register')">Register Here</a><br>
                    <a href="#" onclick="alert('Contact Admin to reset password')" style="font-size: 0.8em; color: gray;">Forgot Password?</a>
                </div>
            </form>
        </div>

        <!-- === REGISTER PAGE === -->
        <div id="register-page" class="hidden">
            <h2>Student Registration</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" required>
                </div>
                <div class="form-group">
                    <label>Roll Number</label>
                    <input type="number" id="reg-roll" required>
                </div>
                <div class="form-group">
                    <label>Class</label>
                    <input type="text" id="reg-class" required>
                </div>
                <div class="form-group">
                    <label>Mobile No.</label>
                    <input type="number" id="reg-mobile" required>
                </div>
                <div class="form-group">
                    <label>Parent's Mobile No.</label>
                    <input type="number" id="reg-parent" required>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="reg-address" rows="2" required></textarea>
                </div>
                <hr>
                <div class="form-group">
                    <label>Email / Username</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" required>
                </div>
                <div class="form-group">
                    <label>Photo</label>
                    <input type="file" id="reg-photo" accept="image/*">
                </div>

                <button type="submit">Register</button>

                <div class="switch-link">
                    Already have an account? <a onclick="showPage('login')">Login Here</a>
                </div>
            </form>
        </div>

        <!-- === VIEW DETAILS PAGE === -->
        <div id="profile-page" class="hidden">
            <h2>Student Dashboard</h2>
            <img id="profile-photo-display" src="" alt="Profile Pic" style="display:block; width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin: 0 auto 10px auto;">
            
            <table style="width: 100%; text-align: left;">
                <tr><td><strong>Name:</strong></td><td id="view-name"></td></tr>
                <tr><td><strong>Roll No:</strong></td><td id="view-roll"></td></tr>
                <tr><td><strong>Class:</strong></td><td id="view-class"></td></tr>
                <tr><td><strong>Email:</strong></td><td id="view-email"></td></tr>
                <tr><td><strong>Mobile:</strong></td><td id="view-mobile"></td></tr>
                <tr><td><strong>Parents:</strong></td><td id="view-parent"></td></tr>
                <tr><td><strong>Address:</strong></td><td id="view-address"></td></tr>
            </table>

            <button onclick="logout()" style="background-color: #dc3545; margin-top: 20px;">Logout</button>
        </div>

    </div>

    <script>
        // JAVASCRIPT: Logic for the application

        let currentUserEmail = null;

        // Function to switch between screens
        function showPage(pageName) {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('register-page').classList.add('hidden');
            document.getElementById('profile-page').classList.add('hidden');

            if(pageName === 'login') document.getElementById('login-page').classList.remove('hidden');
            if(pageName === 'register') document.getElementById('register-page').classList.remove('hidden');
            if(pageName === 'profile') document.getElementById('profile-page').classList.remove('hidden');
        }

        // --- HANDLE REGISTRATION ---
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Stop page reload

            // Get values from inputs
            const userData = {
                name: document.getElementById('reg-name').value,
                roll: document.getElementById('reg-roll').value,
                className: document.getElementById('reg-class').value,
                mobile: document.getElementById('reg-mobile').value,
                parentNo: document.getElementById('reg-parent').value,
                address: document.getElementById('reg-address').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value
            };

            // Convert image file to Base64 string to store in LocalStorage
            const fileInput = document.getElementById('reg-photo');
            if(fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    userData.photo = e.target.result; // Save image string
                    saveAndLogin(userData);
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                // Default image if no photo selected
                userData.photo = ""; 
                saveAndLogin(userData);
            }
        });

        function saveAndLogin(user) {
            // Save user to LocalStorage (Key is the Email)
            localStorage.setItem(user.email, JSON.stringify(user));
            
            alert("Registration Successful! You are now logged in.");
            currentUserEmail = user.email;
            loadDetails(user);
            showPage('profile');
        }

        // --- HANDLE LOGIN ---
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const errorMsg = document.getElementById('login-error');

            // Retrieve user from storage
            const storedUser = localStorage.getItem(email);

            if (storedUser) {
                const userObj = JSON.parse(storedUser);
                if (userObj.password === pass) {
                    errorMsg.style.display = 'none';
                    currentUserEmail = email;
                    loadDetails(userObj);
                    showPage('profile');
                } else {
                    errorMsg.style.display = 'block';
                }
            } else {
                errorMsg.style.display = 'block';
            }
        });

        // --- VIEW DETAILS ---
        function loadDetails(user) {
            document.getElementById('view-name').innerText = user.name;
            document.getElementById('view-roll').innerText = user.roll;
            document.getElementById('view-class').innerText = user.className;
            document.getElementById('view-email').innerText = user.email;
            document.getElementById('view-mobile').innerText = user.mobile;
            document.getElementById('view-parent').innerText = user.parentNo;
            document.getElementById('view-address').innerText = user.address;
            
            if(user.photo) {
                document.getElementById('profile-photo-display').src = user.photo;
            } else {
                document.getElementById('profile-photo-display').src = "https://via.placeholder.com/100";
            }
        }

        // --- LOGOUT ---
        function logout() {
            currentUserEmail = null;
            document.getElementById('loginForm').reset();
            document.getElementById('registerForm').reset();
            showPage('login');
        }
    </script>
</body>
</html>
